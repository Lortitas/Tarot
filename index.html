<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tarot Interactivo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Tarot Online</h1>

<div class="controls">
  <select id="modeSelect">
    <option value="free">Modo libre</option>
    <option value="three">3 cartas</option>
    <option value="five">5 cartas</option>
    <option value="celtic">Cruz Celta</option>
  </select>

  <button onclick="resetReading()">Nueva tirada</button>
</div>

<div class="board">
  <div class="deck" id="deck"></div>
  <div class="spread" id="spread"></div>
</div>

  <div id="spread-area" class="celtic-cross hidden">
  <div class="spread-card pos1"></div>
  <div class="spread-card pos2"></div>
  <div class="spread-card pos3"></div>
  <div class="spread-card pos4"></div>
  <div class="spread-card pos5"></div>
  <div class="spread-card pos6"></div>

  <div class="spread-card pos7"></div>
  <div class="spread-card pos8"></div>
  <div class="spread-card pos9"></div>
  <div class="spread-card pos10"></div>
</div>

<h2>Cartas elegidas</h2>
<div class="reading" id="reading"></div>

<script src="script.js" defer></script>
</body>
</html>
